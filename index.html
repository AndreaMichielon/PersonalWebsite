<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Spineless</title>
    <link rel="icon" type="image/png" href="static/png/s.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Fixed Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 10;
            background: #000;
            border-bottom: 4px solid #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }

        #name-section {
            flex: 1;
            text-align: left;
        }

        #name-section h1 {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        #name-section .subtitle {
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            opacity: 0.8;
            line-height: 1.4;
        }

        #model-container {
            width: 300px;
            height: 180px;
            cursor: pointer;
        }

        /* Main Content */
        #main-content {
            margin-top: 200px;
            position: relative;
            z-index: 5;
            background: #000;
        }

        .section {
            min-height: 60vh; /* Consistent height for all sections */
            padding: 4rem 5%;
            border-top: 4px solid #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 3rem;
            letter-spacing: -1px;
        }

        /* CV Section */
        .cv-buttons {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cv-button {
            background: #fff;
            color: #000;
            padding: 2rem 3rem;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 4px solid #fff;
            min-width: 200px;
            text-align: center;
        }

        .cv-button:hover {
            background: #000;
            color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.2);
        }

        /* Publications Section */
        .publications-content {
            text-align: center;
        }

        .research-link {
            display: inline-block;
            background: transparent;
            color: #fff;
            padding: 2rem 4rem;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.5rem;
            border: 4px solid #fff;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin: 2rem 0;
        }

        .research-link:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }

        /* Art Section */
        .art-content {
            text-align: center;
            position: relative;
        }

        .art-grid {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 2rem;
            margin: 3rem 0;
            padding: 0 2rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
            justify-content: center; /* Center when no overflow */
        }

        .art-grid.has-overflow {
            justify-content: flex-start; /* Left align when scrollable */
        }

        .art-grid::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .art-item {
            aspect-ratio: 1;
            background: #333;
            border: 4px solid #fff;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            flex: 0 0 250px; /* Fixed width, no shrinking */
            height: 250px;
        }

        .art-item:hover {
            transform: rotate(2deg) scale(1.05);
            border-color: #ff69b4;
        }

        /* Scroll arrows - real elements for clickability */
        .scroll-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
            display: none; /* Hidden by default */
        }

        .scroll-arrow-left {
            left: 20px;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-right: 20px solid rgba(255, 255, 255, 0.7);
        }

        .scroll-arrow-right {
            right: 20px;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 20px solid rgba(255, 255, 255, 0.7);
        }

        .scroll-arrow:hover {
            opacity: 1 !important;
        }

        /* Show arrows when parent has overflow */
        .art-content.has-overflow .scroll-arrow,
        .music-content.has-overflow .scroll-arrow {
            display: block;
        }

        .art-content.has-overflow:hover .scroll-arrow,
        .music-content.has-overflow:hover .scroll-arrow {
            opacity: 0.7;
        }

        .art-item {
            aspect-ratio: 1;
            background: #333;
            border: 4px solid #fff;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            flex: 0 0 250px; /* Fixed width for auto-scroll */
            height: 250px;
            display: inline-block;
        }

        .art-item:hover {
            transform: rotate(2deg) scale(1.05);
            border-color: #ff69b4;
        }

        /* Instagram embeds - force square and crop from bottom */
        .art-item .instagram-media {
            width: 100% !important;
            height: 120% !important; /* Make it larger */
            min-width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            position: absolute !important;
            top: -22% !important;
            left: 0 !important;
        }

        .art-item iframe {
            width: 100% !important;
            height: 120% !important; /* Make it larger */
            border: none !important;
            border-radius: 0 !important;
            position: absolute !important;
            top: -22% !important; /* Big screens - 17% */
            left: 0 !important;
        }

        /* Medium screens - 20% crop */
        @media (max-width: 1024px) {
            .art-item .instagram-media {
                top: -22% !important;
            }
            .art-item iframe {
                top: -22% !important;
            }
        }

        /* Remove unused animation styles */

        /* Instagram Button */
        .instagram-button {
            display: inline-block;
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: #fff;
            padding: 2rem 3rem;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 4px solid #ff69b4;
            margin: 2rem 0;
            text-align: center;
        }

        .instagram-button:hover {
            background: #000;
            color: #ff69b4;
            transform: translateY(-5px) skew(-2deg);
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3);
        }

        /* Music Section */
        .music-content {
            text-align: center;
            position: relative;
        }

        .spotify-grid {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 2rem;
            margin: 3rem 0;
            padding: 0 2rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE and Edge */
            justify-content: center; /* Center when no overflow */
        }

        .spotify-grid.has-overflow {
            justify-content: flex-start; /* Left align when scrollable */
        }

        .spotify-grid::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .spotify-item {
            transition: transform 0.3s ease;
            flex: 0 0 250px; /* Fixed width, no shrinking */
        }

        .spotify-item:hover {
            transform: translateY(-5px);
        }

        .spotify-item iframe {
            width: 250px;
            height: 152px;
            border: none;
        }

        /* Remove unused music content pseudo-element styles */

        /* Footer */
        #footer {
            background: #fff;
            color: #000;
            padding: 2rem;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        #footer-text {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.9);
            display: inline-block;
            padding: 0.5rem 1rem;
            opacity: 0;
            transform: translateX(-40px);
        }

        #footer-icon {
            position: absolute;
            top: 50%;
            left: -120px;
            transform: translateY(-50%);
            width: 80px; 
            height: 56px;
            background-image: url('static/png/s.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 3;
        }

        /* Animation keyframes */
        @keyframes iconSwipe {
            0% {
                left: -120px;
                transform: translateY(-50%) rotate(0deg);
            }
            70% {
                left: calc(50% + 250px);
                transform: translateY(-50%) rotate(360deg);
            }
            100% {
                left: calc(50% + 280px);
                transform: translateY(-50%) rotate(360deg);
            }
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            60% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Apply animations directly when footer comes into view */
        #footer.animate-footer #footer-icon {
            animation: iconSwipe 4s ease-in-out forwards;
        }

        #footer.animate-footer #footer-text {
            animation: textReveal 4s ease-in-out forwards;
        }

        /* Remove unused horizontal scrolling keyframes */

        @media (max-width: 768px) {
            #header {
                height: 150px;
                padding: 0 2%;
            }
            
            #model-container {
                width: 200px;
                height: 120px;
            }
            
            #main-content {
                margin-top: 150px;
            }
            
            .cv-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .cv-button {
                min-width: 80%;
            }

            /* Small screens - 30% crop */
            .art-item .instagram-media {
                top: -26% !important;
            }
            .art-item iframe {
                top: -26% !important;
            }

            /* Adjust sizing for mobile */
            .art-item {
                flex: 0 0 200px;
                height: 200px;
            }

            .spotify-item {
                flex: 0 0 200px;
            }

            .spotify-item iframe {
                width: 200px;
                height: 152px;
            }

            /* Adjust grids for mobile */
            .art-grid, .spotify-grid {
                gap: 1rem;
                padding: 0 1rem;
            }
        }

        .scroll-indicator {
            display: none;
        }
    </style>
</head>

    <script async src="//www.instagram.com/embed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.131.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.131.2/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.131.2/examples/js/loaders/OBJLoader.js"></script>
    <script>
        var container = document.getElementById('model-container');
        var camera, scene, renderer;
        var model;
        var isRotating = false;
        var targetRotation = { x: -0.45, y: 0.32 }; // Set default position
        var currentRotation = { x: -0.45, y: 0.32 };
        var mouseInfluence = { x: 0, y: 0 };
        var lastTouchTime = 0;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 1, 1000);
            camera.position.z = 2;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));

            var light = new THREE.PointLight(0xffffff, 0.4);
            camera.add(light);
            scene.add(camera);

            var manager = new THREE.LoadingManager();
            manager.onProgress = function (item, loaded, total) {
                console.log(item, loaded, total);
            };

            var mtlLoader = new THREE.MTLLoader(manager);
            mtlLoader.setPath('static/models/');
            mtlLoader.load('HEAD.mtl', function (materials) {
                materials.preload();
                var objLoader = new THREE.OBJLoader(manager);
                objLoader.setMaterials(materials);
                objLoader.setPath('static/models/');
                objLoader.load('HEAD.obj', function (object) {
                    model = object;
                    model.position.set(0, 0, 0);
                    scene.add(model);
                });
            });

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.setClearColor(0x000000);
            container.appendChild(renderer.domElement);

            // Simplified mouse movement listener - only for desktop
            if (!('ontouchstart' in window)) {
                window.addEventListener('mousemove', onDocumentMouseMove, false);
            }
            
            // Click listener for 360 rotation
            container.addEventListener('click', function(e) {
                if (model && !isRotating) {
                    e.preventDefault();
                    do360Rotation();
                }
            }, false);

            // Simplified touch handlers
            container.addEventListener('touchstart', onTouchStart, { passive: false });
            container.addEventListener('touchmove', onTouchMove, { passive: false });
            container.addEventListener('touchend', onTouchEnd, { passive: false });

            window.addEventListener('resize', onWindowResize, false);
            
            // Add spin listeners for all interactive elements
            addSpinListeners();
        }

        function addSpinListeners() {
            // CV buttons
            document.querySelectorAll('.cv-button').forEach(function(button) {
                button.addEventListener('click', function() {
                    if (model && !isRotating) {
                        do360Rotation();
                    }
                });
            });
            
            // Research link
            document.querySelectorAll('.research-link').forEach(function(link) {
                link.addEventListener('click', function() {
                    if (model && !isRotating) {
                        do360Rotation();
                    }
                });
            });
            
            // Instagram button
            document.querySelectorAll('.instagram-button').forEach(function(link) {
                link.addEventListener('click', function() {
                    if (model && !isRotating) {
                        do360Rotation();
                    }
                });
            });
            
            // Art items
            document.querySelectorAll('.art-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    if (model && !isRotating) {
                        do360Rotation();
                    }
                });
            });
            
            // Spotify items
            document.querySelectorAll('.spotify-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    if (model && !isRotating) {
                        do360Rotation();
                    }
                });
            });
        }

        function onDocumentMouseMove(event) {
            if (!isRotating && model) {
                var containerRect = container.getBoundingClientRect();
                var containerCenterX = containerRect.left + containerRect.width / 2;
                var containerCenterY = containerRect.top + containerRect.height / 2;
                
                var mouseX = (event.clientX - containerCenterX) / (containerRect.width / 2);
                var mouseY = (event.clientY - containerCenterY) / (containerRect.height / 2);
                
                mouseInfluence.x = mouseY * 0.2;
                mouseInfluence.y = mouseX * 0.15;
                
                updateTargetRotation();
            }
        }

        // Simplified touch handlers
        function onTouchStart(event) {
            if (event.touches.length === 1) {
                lastTouchTime = Date.now();
                event.preventDefault(); // Prevent scrolling when touching the model
            }
        }

        function onTouchMove(event) {
            if (!isRotating && model && event.touches.length === 1) {
                var touch = event.touches[0];
                var containerRect = container.getBoundingClientRect();
                
                // Check if touch is within container
                if (touch.clientX >= containerRect.left && 
                    touch.clientX <= containerRect.right &&
                    touch.clientY >= containerRect.top && 
                    touch.clientY <= containerRect.bottom) {
                    
                    event.preventDefault(); // Prevent page scrolling
                    
                    var containerCenterX = containerRect.left + containerRect.width / 2;
                    var containerCenterY = containerRect.top + containerRect.height / 2;
                    
                    var touchX = (touch.clientX - containerCenterX) / (containerRect.width / 2);
                    var touchY = (touch.clientY - containerCenterY) / (containerRect.height / 2);
                    
                    mouseInfluence.x = touchY * 0.2;
                    mouseInfluence.y = touchX * 0.15;
                    
                    updateTargetRotation();
                }
            }
        }

        function onTouchEnd(event) {
            var touchDuration = Date.now() - lastTouchTime;
            
            // If it was a quick tap (less than 200ms), trigger rotation
            if (touchDuration < 200 && !isRotating && model) {
                do360Rotation();
            }
            
            // Reset mouse influence
            mouseInfluence.x = 0;
            mouseInfluence.y = 0;
            updateTargetRotation();
        }

        function updateTargetRotation() {
            targetRotation.x = -0.45 + mouseInfluence.x;
            targetRotation.y = 0.32 + mouseInfluence.y;
        }

        function do360Rotation() {
            isRotating = true;
            var startTime = Date.now();
            var duration = Math.floor(Math.random() * (2000 - 100 + 1)) + 100;
            var startRotationY = model.rotation.y;
            var targetRotationY = startRotationY + Math.PI * 2;

            function rotateStep() {
                var elapsed = Date.now() - startTime;
                var progress = Math.min(elapsed / duration, 1);
                
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                
                model.rotation.y = startRotationY + (targetRotationY - startRotationY) * easeProgress;
                
                if (progress < 1) {
                    requestAnimationFrame(rotateStep);
                } else {
                    isRotating = false;
                }
            }
            
            rotateStep();
        }

        function onWindowResize() {
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (model && !isRotating) {
                currentRotation.x += (targetRotation.x - currentRotation.x) * 0.05;
                currentRotation.y += (targetRotation.y - currentRotation.y) * 0.05;
                
                model.rotation.x = currentRotation.x;
                model.rotation.y = currentRotation.y;
            }
            
            renderer.render(scene, camera);
        }

        // Scroll trigger for footer animation with retriggering
        function checkFooterInView() {
            const footer = document.getElementById('footer');
            const rect = footer.getBoundingClientRect();
            const windowHeight = window.innerHeight;
            
            const isVisible = rect.top <= windowHeight && rect.bottom >= 0;
            
            if (isVisible && !footer.classList.contains('animate-footer')) {
                footer.classList.add('animate-footer');
                console.log('Footer animation triggered!');
            } else if (!isVisible && footer.classList.contains('animate-footer')) {
                footer.classList.remove('animate-footer');
                
                const footerIcon = document.getElementById('footer-icon');
                const footerText = document.getElementById('footer-text');
                
                footerIcon.style.animation = 'none';
                footerText.style.animation = 'none';
                
                setTimeout(() => {
                    footerIcon.style.animation = '';
                    footerText.style.animation = '';
                }, 10);
                
                console.log('Footer animation reset!');
            }
        }

        window.addEventListener('scroll', checkFooterInView);
        window.addEventListener('load', checkFooterInView);
        setTimeout(checkFooterInView, 500);

        // Check for overflow and show scroll indicators
        function checkOverflow() {
            const artGrid = document.querySelector('.art-grid');
            const artContent = document.querySelector('.art-content');
            const spotifyGrid = document.querySelector('.spotify-grid');
            const musicContent = document.querySelector('.music-content');
            
            // Check art grid overflow
            if (artGrid.scrollWidth > artGrid.clientWidth) {
                artContent.classList.add('has-overflow');
                artGrid.classList.add('has-overflow');
            } else {
                artContent.classList.remove('has-overflow');
                artGrid.classList.remove('has-overflow');
            }
            
            // Check spotify grid overflow
            if (spotifyGrid.scrollWidth > spotifyGrid.clientWidth) {
                musicContent.classList.add('has-overflow');
                spotifyGrid.classList.add('has-overflow');
            } else {
                musicContent.classList.remove('has-overflow');
                spotifyGrid.classList.remove('has-overflow');
            }
        }

        // Create clickable arrow elements
        function createScrollArrows() {
            // Art section arrows
            const artContent = document.querySelector('.art-content');
            const artGrid = document.querySelector('.art-grid');
            
            const artLeftArrow = document.createElement('div');
            artLeftArrow.className = 'scroll-arrow scroll-arrow-left art-arrow-left';
            artLeftArrow.addEventListener('click', () => {
                artGrid.scrollBy({ left: -300, behavior: 'smooth' });
            });
            
            const artRightArrow = document.createElement('div');
            artRightArrow.className = 'scroll-arrow scroll-arrow-right art-arrow-right';
            artRightArrow.addEventListener('click', () => {
                artGrid.scrollBy({ left: 300, behavior: 'smooth' });
            });
            
            artContent.appendChild(artLeftArrow);
            artContent.appendChild(artRightArrow);
            
            // Music section arrows
            const musicContent = document.querySelector('.music-content');
            const spotifyGrid = document.querySelector('.spotify-grid');
            
            const musicLeftArrow = document.createElement('div');
            musicLeftArrow.className = 'scroll-arrow scroll-arrow-left music-arrow-left';
            musicLeftArrow.addEventListener('click', () => {
                spotifyGrid.scrollBy({ left: -300, behavior: 'smooth' });
            });
            
            const musicRightArrow = document.createElement('div');
            musicRightArrow.className = 'scroll-arrow scroll-arrow-right music-arrow-right';
            musicRightArrow.addEventListener('click', () => {
                spotifyGrid.scrollBy({ left: 300, behavior: 'smooth' });
            });
            
            musicContent.appendChild(musicLeftArrow);
            musicContent.appendChild(musicRightArrow);
        }

        // Check overflow on load and resize
        window.addEventListener('load', () => {
            createScrollArrows();
            checkOverflow();
        });
        window.addEventListener('resize', checkOverflow);
        checkOverflow();
    </script>
</body>
</html>
